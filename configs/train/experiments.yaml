experiments:
  B0:
    name: B0_yolo11s_pretrained_eval
    model: yolo11s.pt
    modules: pretrained-eval-only
    use_nwd: false
    eval_only: true
  B1:
    name: B1_yolo11s_conservative
    model: yolo11s.pt
    modules: conservative-baseline
    use_nwd: false
  B2:
    name: B2_yolo11s_conservative_freeze
    model: yolo11s.pt
    modules: conservative-baseline-freeze10
    use_nwd: false
    train_config: configs/train/full_conservative_freeze.yaml
  BV2N:
    name: BV2N_yolo11n_balanced_v2_smoke
    model: yolo11n.pt
    modules: balanced-v2-nano-smoke
    use_nwd: false
    train_config: configs/train/balanced_v2_nano_smoke.yaml
  BV2S:
    name: BV2S_yolo11s_balanced_v2_baseline
    model: yolo11s.pt
    modules: balanced-v2-yolo11s-baseline
    use_nwd: false
    train_config: configs/train/balanced_v2_baseline.yaml
  BV2S_CTL:
    name: BV2S_CTL_yolo11s_balanced_v2_control
    model: yolo11s.pt
    modules: balanced-v2-control-map50
    use_nwd: false
    train_config: configs/train/balanced_v2_control.yaml
  BV3S_A:
    name: BV3S_A_yolo11s_balanced_v3_uniform
    model: yolo11s.pt
    modules: balanced-v3-uniform-map50
    use_nwd: false
    train_config: configs/train/balanced_v3_a.yaml
  BV3S_B:
    name: BV3S_B_yolo11s_balanced_v3_source_balanced
    model: yolo11s.pt
    modules: balanced-v3-source-balanced-map50
    use_nwd: false
    train_config: configs/train/balanced_v3_b.yaml
  BV3S_768:
    name: BV3S_768_yolo11s_balanced_v3_imgsz768
    model: yolo11s.pt
    modules: balanced-v3-imgsz768-map50
    use_nwd: false
    train_config: configs/train/balanced_v3_768.yaml
  BV3S_768_FAST:
    name: BV3S_768_FAST_yolo11s_balanced_v3_imgsz768
    model: yolo11s.pt
    modules: balanced-v3-imgsz768-online-fast
    use_nwd: false
    train_config: configs/train/balanced_v3_768_fast.yaml
  BV3S_768_LOWLR:
    name: BV3S_768_LOWLR_yolo11s_balanced_v3_imgsz768
    model: yolo11s.pt
    modules: balanced-v3-imgsz768-online-lowlr
    use_nwd: false
    train_config: configs/train/balanced_v3_768_lowlr.yaml
  E0:
    name: E0_yolo11s_baseline
    model: yolo11s.pt
    modules: baseline
    use_nwd: false
  E1:
    name: E1_yolo11s_ssb_p3
    model: configs/models/bubble_yolo11s_ssb_p3.yaml
    modules: SSBRefine-P3
    use_nwd: false
  E2:
    name: E2_yolo11s_glrb_p3
    model: configs/models/bubble_yolo11s_glrb_p3.yaml
    modules: GLRB-P3
    use_nwd: false
  E3:
    name: E3_yolo11s_ssb_glrb_p3
    model: configs/models/bubble_yolo11s_ssb_glrb_p3.yaml
    modules: SSBRefine-P3+GLRB-P3
    use_nwd: false
  E4:
    name: E4_yolo11s_ssb_glrb_all
    model: configs/models/bubble_yolo11s_ssb_glrb_all.yaml
    modules: SSBRefine-P3/P4/P5+GLRB-P3/P4/P5
    use_nwd: false
  E5:
    name: E5_bubble_yolo11s_final_nwd
    model: configs/models/bubble_yolo11s_final.yaml
    modules: SSBRefine+GLRB+NWD
    use_nwd: true
    nwd_weight: 0.4
    nwd_constant: 12.8
