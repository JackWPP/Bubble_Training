# Full training config for YOLO-seg bubble segmentation.
task: segment
mode: train
model: null  # Set via CLI
data: /home/xgx/Bubble_Training/segmentation/datasets/paper_v4_seg/bubble_seg.yaml

epochs: 100
batch: 2
imgsz: 768
device: 0
workers: 2

patience: 30
close_mosaic: 5
mosaic: 0.3
mixup: 0.1
hsv_h: 0.01
hsv_s: 0.3
hsv_v: 0.2
degrees: 0.0
translate: 0.02
scale: 0.05
shear: 0.0
fliplr: 0.5
flipud: 0.0
erasing: 0.0
crop_fraction: 1.0

optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

box: 7.5
cls: 0.5
dfl: 1.5

save: true
save_period: 5
exist_ok: true
pretrained: true
verbose: true
