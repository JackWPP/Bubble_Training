<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="SimSun, 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="grad-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="33%" stop-color="#27AE60"/>
      <stop offset="66%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#E74C3C"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="340" fill="#FAFBFC" rx="6"/>
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C3E50">Bubble-YOLO11s 改进历程</text>
  <text x="450" y="44" text-anchor="middle" font-size="10" fill="#95A5A6">从 YOLO11s 基线到 Bubble-YOLO11s 最终模型的逐步提升轨迹</text>

  <!-- ===== Main timeline bar ===== -->
  <rect x="60" y="75" width="780" height="20" rx="10" fill="url(#grad-bar)" opacity="0.3"/>
  <rect x="60" y="75" width="780" height="20" rx="10" fill="none" stroke="#BDC3C7" stroke-width="1"/>

  <!-- ===== Step markers ===== -->

  <!-- Step 0: Baseline -->
  <line x1="80" y1="95" x2="80" y2="125" stroke="#3498DB" stroke-width="2"/>
  <circle cx="80" cy="130" r="5" fill="#3498DB"/>
  <text x="80" y="152" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C5F8A">基线</text>
  <text x="80" y="166" text-anchor="middle" font-size="9" fill="#4A90D9">YOLO11s</text>
  <text x="80" y="180" text-anchor="middle" font-size="8" fill="#7F8C8D">+COCO预训练</text>

  <rect x="20" y="195" width="120" height="28" rx="4" fill="#D6EAF8" stroke="#2980B9" stroke-width="1" filter="url(#sh)"/>
  <text x="80" y="208" text-anchor="middle" font-size="9" font-weight="bold" fill="#2C5F8A">S = 1.21507</text>
  <text x="80" y="220" text-anchor="middle" font-size="7" fill="#4A90D9">mAP50=0.798 | mAP50-95=0.417</text>

  <!-- Arrow 0→1 -->
  <text x="175" y="148" text-anchor="middle" font-size="9" fill="#27AE60">+0.01627</text>
  <line x1="200" y1="130" x2="275" y2="130" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1: P3LCRefine -->
  <line x1="280" y1="95" x2="280" y2="125" stroke="#27AE60" stroke-width="2"/>
  <circle cx="280" cy="130" r="5" fill="#27AE60"/>
  <text x="280" y="152" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E8449">+P3LCRefine</text>
  <text x="280" y="166" text-anchor="middle" font-size="9" fill="#27AE60">局部对比度</text>
  <text x="280" y="180" text-anchor="middle" font-size="8" fill="#7F8C8D">~1.2K params</text>

  <rect x="225" y="195" width="110" height="28" rx="4" fill="#D5F5E3" stroke="#27AE60" stroke-width="1" filter="url(#sh)"/>
  <text x="280" y="208" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E8449">S = 1.23134</text>
  <text x="280" y="220" text-anchor="middle" font-size="7" fill="#27AE60">+1.34%</text>

  <!-- Arrow 1→2 -->
  <text x="375" y="148" text-anchor="middle" font-size="9" fill="#8E44AD">+0.00828</text>
  <line x1="390" y1="130" x2="465" y2="130" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: NWD -->
  <line x1="470" y1="95" x2="470" y2="125" stroke="#8E44AD" stroke-width="2"/>
  <circle cx="470" cy="130" r="5" fill="#8E44AD"/>
  <text x="470" y="152" text-anchor="middle" font-size="10" font-weight="bold" fill="#6C3483">+NWD Loss</text>
  <text x="470" y="166" text-anchor="middle" font-size="9" fill="#8E44AD">w=0.05, C=12.8</text>
  <text x="470" y="180" text-anchor="middle" font-size="8" fill="#7F8C8D">平滑小目标梯度</text>

  <rect x="405" y="195" width="130" height="28" rx="4" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1" filter="url(#sh)"/>
  <text x="470" y="208" text-anchor="middle" font-size="9" font-weight="bold" fill="#6C3483">S = 1.23962</text>
  <text x="470" y="220" text-anchor="middle" font-size="7" fill="#8E44AD">+2.02% total</text>

  <!-- Arrow 2→3 -->
  <text x="565" y="148" text-anchor="middle" font-size="9" fill="#E67E22">+0.01179</text>
  <line x1="600" y1="130" x2="645" y2="130" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Mosaic0.5+HSV -->
  <line x1="650" y1="95" x2="650" y2="125" stroke="#E67E22" stroke-width="2"/>
  <circle cx="650" cy="130" r="5" fill="#E67E22"/>
  <text x="650" y="152" text-anchor="middle" font-size="10" font-weight="bold" fill="#D35400">+Mosaic(0.5)</text>
  <text x="650" y="166" text-anchor="middle" font-size="9" fill="#E67E22">+HSV 扰动</text>
  <text x="650" y="180" text-anchor="middle" font-size="8" fill="#7F8C8D">数据增强突破</text>

  <rect x="585" y="195" width="130" height="28" rx="4" fill="#FDEBD0" stroke="#E67E22" stroke-width="1" filter="url(#sh)"/>
  <text x="650" y="208" text-anchor="middle" font-size="9" font-weight="bold" fill="#D35400">S = 1.25141</text>
  <text x="650" y="220" text-anchor="middle" font-size="7" fill="#E67E22">+2.99% total</text>

  <!-- Step 4: Mosaic1.0+MixUp -->
  <line x1="790" y1="95" x2="790" y2="125" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="790" cy="130" r="5" fill="#E74C3C"/>
  <text x="790" y="152" text-anchor="middle" font-size="10" font-weight="bold" fill="#922B21">+MixUp</text>
  <text x="790" y="166" text-anchor="middle" font-size="9" fill="#E74C3C">+最优种子</text>
  <text x="790" y="180" text-anchor="middle" font-size="8" fill="#7F8C8D">Bubble-YOLO11s</text>

  <rect x="725" y="195" width="130" height="28" rx="4" fill="#FADBD8" stroke="#E74C3C" stroke-width="1" filter="url(#sh)"/>
  <text x="790" y="208" text-anchor="middle" font-size="9" font-weight="bold" fill="#922B21">S = 1.26300</text>
  <text x="790" y="220" text-anchor="middle" font-size="7" fill="#E74C3C">+3.94% total</text>

  <text x="720" y="148" text-anchor="middle" font-size="9" fill="#E74C3C">+0.00852</text>

  <!-- ===== Phase labels ===== -->
  <rect x="60" y="250" width="200" height="22" rx="4" fill="#3498DB" opacity="0.15" stroke="#3498DB" stroke-width="0.8"/>
  <text x="160" y="265" text-anchor="middle" font-size="8" fill="#2C5F8A">阶段一: 架构改进</text>

  <rect x="280" y="250" width="320" height="22" rx="4" fill="#27AE60" opacity="0.15" stroke="#27AE60" stroke-width="0.8"/>
  <text x="440" y="265" text-anchor="middle" font-size="8" fill="#1E8449">阶段二: 损失函数融合</text>

  <rect x="620" y="250" width="220" height="22" rx="4" fill="#E67E22" opacity="0.15" stroke="#E67E22" stroke-width="0.8"/>
  <text x="730" y="265" text-anchor="middle" font-size="8" fill="#D35400">阶段三: 数据增强配方</text>

  <!-- ===== Bubble-YOLO11s final ===== -->
  <rect x="310" y="285" width="280" height="40" rx="6" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4,2" filter="url(#sh)"/>
  <text x="450" y="302" text-anchor="middle" font-size="10" font-weight="bold" fill="#D35400">Bubble-YOLO11s 最终结果: S = 1.26300</text>
  <text x="450" y="318" text-anchor="middle" font-size="9" fill="#E67E22">最优配方 + 最优种子 (seed=48), +3.94% over baseline</text>

  <!-- ===== Legend ===== -->
  <rect x="30" y="10" width="12" height="4" rx="2" fill="#27AE60"/>
  <text x="48" y="13" font-size="7" fill="#7F8C8D">架构  </text>
  <rect x="85" y="10" width="12" height="4" rx="2" fill="#8E44AD"/>
  <text x="103" y="13" font-size="7" fill="#7F8C8D">损失  </text>
  <rect x="135" y="10" width="12" height="4" rx="2" fill="#E67E22"/>
  <text x="153" y="13" font-size="7" fill="#7F8C8D">数据增强</text>
</svg>
