<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="SimSun, 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <filter id="sh">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1.5" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="440" fill="#FAFBFC" rx="6"/>
  <text x="400" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C3E50">Mosaic 增强原理</text>
  <text x="400" y="42" text-anchor="middle" font-size="10" fill="#95A5A6">将四张训练图像随机缩放后拼接为一张新的训练样本</text>

  <!-- ===== 4 source images ===== -->
  <text x="150" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">原始图像 (4张)</text>

  <!-- Image 1 -->
  <rect x="25" y="84" width="115" height="95" rx="4" fill="#D6EAF8" stroke="#2980B9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="82" y="120" text-anchor="middle" font-size="8" fill="#2C5F8A">图像 A</text>
  <text x="82" y="136" text-anchor="middle" font-size="7" fill="#7F8C8D">(20+40, 显微镜)</text>
  <text x="82" y="150" text-anchor="middle" font-size="7" fill="#7F8C8D">稀疏气泡</text>
  <!-- bubble dots -->
  <circle cx="60" cy="105" r="4" fill="#4A90D9" opacity="0.5"/>
  <circle cx="90" cy="100" r="3" fill="#4A90D9" opacity="0.5"/>
  <circle cx="75" cy="112" r="2.5" fill="#4A90D9" opacity="0.5"/>

  <!-- Image 2 -->
  <rect x="155" y="84" width="115" height="95" rx="4" fill="#FADBD8" stroke="#E74C3C" stroke-width="1.5" filter="url(#sh)"/>
  <text x="212" y="120" text-anchor="middle" font-size="8" fill="#922B21">图像 B</text>
  <text x="212" y="136" text-anchor="middle" font-size="7" fill="#7F8C8D">(job_13, 0.08浓度)</text>
  <text x="212" y="150" text-anchor="middle" font-size="7" fill="#7F8C8D">中等密度</text>
  <circle cx="180" cy="105" r="5" fill="#E74C3C" opacity="0.5"/>
  <circle cx="200" cy="100" r="4" fill="#E74C3C" opacity="0.5"/>
  <circle cx="215" cy="115" r="3" fill="#E74C3C" opacity="0.5"/>
  <circle cx="230" cy="108" r="4.5" fill="#E74C3C" opacity="0.5"/>

  <!-- Image 3 -->
  <rect x="25" y="195" width="115" height="95" rx="4" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5" filter="url(#sh)"/>
  <text x="82" y="231" text-anchor="middle" font-size="8" fill="#1E8449">图像 C</text>
  <text x="82" y="247" text-anchor="middle" font-size="7" fill="#7F8C8D">(bubble_fc, -40°C)</text>
  <text x="82" y="261" text-anchor="middle" font-size="7" fill="#7F8C8D">密集小气泡</text>
  <circle cx="50" cy="210" r="3" fill="#27AE60" opacity="0.5"/>
  <circle cx="70" cy="215" r="2.5" fill="#27AE60" opacity="0.5"/>
  <circle cx="90" cy="208" r="3.5" fill="#27AE60" opacity="0.5"/>
  <circle cx="60" cy="230" r="2" fill="#27AE60" opacity="0.5"/>
  <circle cx="80" cy="235" r="3" fill="#27AE60" opacity="0.5"/>
  <circle cx="100" cy="225" r="4" fill="#27AE60" opacity="0.5"/>

  <!-- Image 4 -->
  <rect x="155" y="195" width="115" height="95" rx="4" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5" filter="url(#sh)"/>
  <text x="212" y="231" text-anchor="middle" font-size="8" fill="#6C3483">图像 D</text>
  <text x="212" y="247" text-anchor="middle" font-size="7" fill="#7F8C8D">(60+80, 显微镜)</text>
  <text x="212" y="261" text-anchor="middle" font-size="7" fill="#7F8C8D">不同背景纹理</text>
  <circle cx="180" cy="210" r="6" fill="#8E44AD" opacity="0.4"/>
  <circle cx="200" cy="225" r="4" fill="#8E44AD" opacity="0.4"/>
  <circle cx="215" cy="215" r="5" fill="#8E44AD" opacity="0.4"/>

  <!-- Arrows from each image -->
  <line x1="142" y1="131" x2="290" y2="200" stroke="#95A5A6" stroke-width="1.2"/>
  <line x1="270" y1="131" x2="290" y2="260" stroke="#95A5A6" stroke-width="1.2"/>
  <line x1="142" y1="242" x2="290" y2="340" stroke="#95A5A6" stroke-width="1.2"/>
  <line x1="270" y1="242" x2="290" y2="400" stroke="#95A5A6" stroke-width="1.2"/>

  <!-- ===== MOSAIC RESULT ===== -->
  <text x="480" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#E67E22">Mosaic 拼接结果 (768×768)</text>

  <rect x="295" y="85" width="200" height="200" rx="6" fill="#FFF3E0" stroke="#E67E22" stroke-width="2" filter="url(#sh)"/>

  <!-- Grid lines -->
  <line x1="395" y1="85" x2="395" y2="285" stroke="#E67E22" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="295" y1="185" x2="495" y2="185" stroke="#E67E22" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Quadrant A (top-left) -->
  <text x="345" y="120" text-anchor="middle" font-size="7" fill="#D35400">区域 A</text>
  <text x="345" y="135" text-anchor="middle" font-size="6" fill="#E67E22">(缩放 0.8×)</text>
  <circle cx="320" cy="110" r="4" fill="#4A90D9" opacity="0.4"/>
  <circle cx="360" cy="105" r="3" fill="#4A90D9" opacity="0.4"/>

  <!-- Quadrant B (top-right) -->
  <text x="445" y="120" text-anchor="middle" font-size="7" fill="#D35400">区域 B</text>
  <text x="445" y="135" text-anchor="middle" font-size="6" fill="#E67E22">(缩放 1.2×)</text>
  <circle cx="420" cy="110" r="6" fill="#E74C3C" opacity="0.4"/>
  <circle cx="445" cy="100" r="5" fill="#E74C3C" opacity="0.4"/>
  <circle cx="470" cy="115" r="3.5" fill="#E74C3C" opacity="0.4"/>

  <!-- Quadrant C (bottom-left) -->
  <text x="345" y="220" text-anchor="middle" font-size="7" fill="#D35400">区域 C</text>
  <text x="345" y="235" text-anchor="middle" font-size="6" fill="#E67E22">(缩放 0.9×)</text>
  <circle cx="320" cy="210" r="2.5" fill="#27AE60" opacity="0.4"/>
  <circle cx="340" cy="215" r="2" fill="#27AE60" opacity="0.4"/>
  <circle cx="360" cy="208" r="3" fill="#27AE60" opacity="0.4"/>
  <circle cx="330" cy="230" r="2.5" fill="#27AE60" opacity="0.4"/>

  <!-- Quadrant D (bottom-right) -->
  <text x="445" y="220" text-anchor="middle" font-size="7" fill="#D35400">区域 D</text>
  <text x="445" y="235" text-anchor="middle" font-size="6" fill="#E67E22">(缩放 1.1×)</text>
  <circle cx="420" cy="210" r="5.5" fill="#8E44AD" opacity="0.4"/>
  <circle cx="450" cy="215" r="4" fill="#8E44AD" opacity="0.4"/>
  <circle cx="440" cy="230" r="4.5" fill="#8E44AD" opacity="0.4"/>

  <!-- Annotation: mosaic center point -->
  <circle cx="395" cy="185" r="15" fill="none" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="395" y="210" text-anchor="middle" font-size="7" fill="#E67E22">拼接中心</text>

  <!-- ===== BENEFITS LIST ===== -->
  <rect x="510" y="85" width="270" height="200" rx="6" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="645" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">Mosaic 增强的效果</text>

  <line x1="525" y1="118" x2="765" y2="118" stroke="#ECF0F1" stroke-width="1"/>

  <text x="525" y="138" font-size="9" font-weight="bold" fill="#E67E22">① 多尺度多样性</text>
  <text x="535" y="154" font-size="8" fill="#7F8C8D">4图独立随机缩放(0.5×~1.5×)</text>
  <text x="535" y="168" font-size="8" fill="#7F8C8D">→ 单张包含多种气泡尺度</text>

  <text x="525" y="192" font-size="9" font-weight="bold" fill="#E67E22">② 多背景多样性</text>
  <text x="535" y="208" font-size="8" fill="#7F8C8D">4图来自4个不同采集条件</text>
  <text x="535" y="222" font-size="8" fill="#7F8C8D">→ 打破背景纹理与目标的伪相关</text>

  <text x="525" y="246" font-size="9" font-weight="bold" fill="#E67E22">③ 密度变化</text>
  <text x="535" y="262" font-size="8" fill="#7F8C8D">有效batch内实例数扩大~4倍</text>
  <text x="535" y="276" font-size="8" fill="#7F8C8D">→ 损失估计更稳定</text>

  <!-- ===== Config bar ===== -->
  <rect x="25" y="320" width="755" height="110" rx="8" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1.5" filter="url(#sh)"/>

  <text x="400" y="342" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">训练配置</text>

  <rect x="45" y="355" width="160" height="30" rx="4" fill="#D6EAF8" stroke="#2980B9" stroke-width="1"/>
  <text x="125" y="368" text-anchor="middle" font-size="8" fill="#2C5F8A">Mosaic p = 1.0</text>
  <text x="125" y="380" text-anchor="middle" font-size="7" fill="#4A90D9">1-20轮全部使用Mosaic</text>

  <rect x="220" y="355" width="160" height="30" rx="4" fill="#D6EAF8" stroke="#2980B9" stroke-width="1"/>
  <text x="300" y="368" text-anchor="middle" font-size="8" fill="#2C5F8A">close_mosaic = 10</text>
  <text x="300" y="380" text-anchor="middle" font-size="7" fill="#4A90D9">最后10轮使用原图</text>

  <rect x="395" y="355" width="160" height="30" rx="4" fill="#D6EAF8" stroke="#2980B9" stroke-width="1"/>
  <text x="475" y="368" text-anchor="middle" font-size="8" fill="#2C5F8A">MixUp p = 0.2</text>
  <text x="475" y="380" text-anchor="middle" font-size="7" fill="#4A90D9">Beta(32,32) 混合</text>

  <rect x="570" y="355" width="195" height="30" rx="4" fill="#D6EAF8" stroke="#2980B9" stroke-width="1"/>
  <text x="667" y="368" text-anchor="middle" font-size="8" fill="#2C5F8A">HSV h=0.015 s=0.5 v=0.4</text>
  <text x="667" y="380" text-anchor="middle" font-size="7" fill="#4A90D9">色彩空间扰动</text>

  <text x="400" y="412" text-anchor="middle" font-size="9" fill="#E67E22">Mosaic=0→1.0 是最大的单次性能提升 (+0.01486) | 未纳入: Copy-Paste, CutMix, Mosaic9, 旋转</text>
</svg>
