<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 580" font-family="SimSun, 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="950" height="580" fill="#FAFBFC" rx="6"/>
  <text x="475" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C3E50">Bubble-YOLO11s 完整训练与评估流程</text>

  <!-- ===== PHASE 1: Dataset ===== -->
  <rect x="20" y="42" width="290" height="230" rx="8" fill="#EBF5FB" stroke="#4A90D9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="165" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C5F8A">阶段一: 数据集构建</text>

  <rect x="35" y="78" width="260" height="32" rx="4" fill="#fff" stroke="#BDC3C7" stroke-width="1"/>
  <text x="165" y="92" text-anchor="middle" font-size="9" fill="#333">7个COCO子数据集合并 → 单类 bubble</text>
  <text x="165" y="105" text-anchor="middle" font-size="8" fill="#7F8C8D">170原始图像, 9524标注框</text>

  <text x="165" y="130" text-anchor="middle" font-size="9" fill="#4A90D9">▼</text>

  <rect x="35" y="138" width="260" height="32" rx="4" fill="#fff" stroke="#BDC3C7" stroke-width="1"/>
  <text x="165" y="152" text-anchor="middle" font-size="9" fill="#333">source_key 隔离拆分 → 70/15/15</text>
  <text x="165" y="165" text-anchor="middle" font-size="8" fill="#7F8C8D">train/dev/test 严格无泄漏</text>

  <text x="165" y="190" text-anchor="middle" font-size="9" fill="#4A90D9">▼</text>

  <rect x="35" y="198" width="260" height="32" rx="4" fill="#fff" stroke="#BDC3C7" stroke-width="1"/>
  <text x="165" y="212" text-anchor="middle" font-size="9" fill="#333">768×768 直接缩放 + 水平翻转</text>
  <text x="165" y="225" text-anchor="middle" font-size="8" fill="#7F8C8D">644 train / 83 val / 83 test</text>

  <text x="165" y="252" text-anchor="middle" font-size="9" fill="#4A90D9">▼</text>

  <rect x="35" y="258" width="260" height="10" opacity="0"/>

  <text x="165" y="268" text-anchor="middle" font-size="8" fill="#2C5F8A">输出: yolo_dataset_paper_v4</text>

  <line x1="310" y1="155" x2="335" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 2: Training ===== -->
  <rect x="340" y="42" width="280" height="300" rx="8" fill="#EAFAF1" stroke="#27AE60" stroke-width="1.5" filter="url(#sh)"/>
  <text x="480" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E8449">阶段二: 模型训练</text>

  <rect x="355" y="80" width="250" height="40" rx="4" fill="#fff" stroke="#BDC3C7" stroke-width="1"/>
  <text x="480" y="96" text-anchor="middle" font-size="9" fill="#333">COCO 预训练 yolo11s.pt</text>
  <text x="480" y="112" text-anchor="middle" font-size="8" fill="#7F8C8D">9.41M params | 21.3 GFLOPs</text>

  <text x="480" y="138" text-anchor="middle" font-size="9" fill="#27AE60">▼</text>

  <rect x="355" y="146" width="250" height="40" rx="4" fill="#fff" stroke="#BDC3C7" stroke-width="1"/>
  <text x="480" y="162" text-anchor="middle" font-size="9" fill="#333">权重重映射 → 插入P3LCRefine</text>
  <text x="480" y="178" text-anchor="middle" font-size="8" fill="#7F8C8D">预训练层直接复制 | 新模块恒等初始化</text>

  <text x="480" y="205" text-anchor="middle" font-size="9" fill="#27AE60">▼</text>

  <rect x="355" y="213" width="250" height="72" rx="4" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5"/>
  <text x="480" y="230" text-anchor="middle" font-size="9" font-weight="bold" fill="#D35400">SGD 微调 30 epochs</text>
  <text x="480" y="246" text-anchor="middle" font-size="8" fill="#7F8C8D">lr₀=0.001 | 余弦退火 | warmup=3</text>
  <text x="480" y="260" text-anchor="middle" font-size="8" fill="#7F8C8D">batch=8 | imgsz=768 | AMP</text>
  <text x="480" y="274" text-anchor="middle" font-size="8" fill="#7F8C8D">Mosaic(1.0) + HSV + MixUp(0.2)</text>

  <text x="480" y="305" text-anchor="middle" font-size="9" fill="#27AE60">▼</text>

  <text x="480" y="325" text-anchor="middle" font-size="8" fill="#1E8449">输出: 30组 epoch 权重</text>

  <line x1="620" y1="185" x2="645" y2="185" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 3: Selection ===== -->
  <rect x="650" y="42" width="280" height="230" rx="8" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5" filter="url(#sh)"/>
  <text x="790" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#6C3483">阶段三: 权重筛选</text>

  <rect x="665" y="80" width="250" height="55" rx="4" fill="#fff" stroke="#BDC3C7" stroke-width="1"/>
  <text x="790" y="96" text-anchor="middle" font-size="9" fill="#333">Train-dev split 评估</text>
  <text x="790" y="112" text-anchor="middle" font-size="8" fill="#7F8C8D">每个epoch权重评估 mAP@50</text>
  <text x="790" y="126" text-anchor="middle" font-size="8" fill="#7F8C8D">(source_key隔离, 零泄漏)</text>

  <text x="790" y="150" text-anchor="middle" font-size="9" fill="#8E44AD">▼</text>

  <rect x="665" y="158" width="250" height="55" rx="4" fill="#FFF3E0" stroke="#E67E22" stroke-width="2"/>
  <text x="790" y="174" text-anchor="middle" font-size="9" font-weight="bold" fill="#D35400">双阈值过滤</text>
  <text x="790" y="190" text-anchor="middle" font-size="8" fill="#7F8C8D">Precision ≥ 0.75</text>
  <text x="790" y="204" text-anchor="middle" font-size="8" fill="#7F8C8D">Recall ≥ 0.72</text>

  <text x="790" y="230" text-anchor="middle" font-size="9" fill="#8E44AD">▼</text>

  <text x="790" y="252" text-anchor="middle" font-size="8" fill="#6C3483">输出: map50_selected.pt</text>

  <line x1="790" y1="272" x2="790" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== PHASE 4: Evaluation ===== -->
  <rect x="340" y="365" width="590" height="200" rx="8" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5" filter="url(#sh)"/>
  <text x="635" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="#922B21">阶段四: 最终评估</text>

  <!-- Main test -->
  <rect x="355" y="400" width="250" height="75" rx="5" fill="#fff" stroke="#BDC3C7" stroke-width="1" filter="url(#sh)"/>
  <text x="480" y="418" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C3E50">主测试集 (In-Domain)</text>
  <text x="480" y="436" text-anchor="middle" font-size="9" fill="#7F8C8D">Paper V4 test: 83 张图像</text>
  <text x="480" y="452" text-anchor="middle" font-size="9" fill="#7F8C8D">指标: mAP@50, mAP@50:95, Precision, Recall</text>
  <text x="480" y="468" text-anchor="middle" font-size="8" fill="#95A5A6">→ 论文主实验结果</text>

  <!-- OOD test -->
  <rect x="630" y="400" width="285" height="75" rx="5" fill="#fff" stroke="#BDC3C7" stroke-width="1" filter="url(#sh)"/>
  <text x="772" y="418" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C3E50">分布外测试集 (OOD)</text>
  <text x="772" y="436" text-anchor="middle" font-size="9" fill="#7F8C8D">Grouped test: 208 张图像</text>
  <text x="772" y="452" text-anchor="middle" font-size="9" fill="#7F8C8D">场景隔离, 训练中完全不可见</text>
  <text x="772" y="468" text-anchor="middle" font-size="8" fill="#95A5A6">→ 泛化性验证</text>

  <!-- Result summary -->
  <rect x="355" y="487" width="560" height="68" rx="6" fill="#D5F5E3" stroke="#27AE60" stroke-width="2" filter="url(#sh)"/>
  <text x="635" y="506" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E8449">最终结果 (Bubble-YOLO11s, seed=48)</text>
  <text x="635" y="524" text-anchor="middle" font-size="9" fill="#333">主测试集: mAP@50=0.82535 | mAP@50:95=0.43765 | S=1.26300 (+3.94%)</text>
  <text x="635" y="542" text-anchor="middle" font-size="9" fill="#333">分布外测试集: mAP@50=0.86199 | mAP@50:95=0.53569</text>

  <!-- ===== Hardware note ===== -->
  <rect x="20" y="365" width="290" height="200" rx="8" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="165" y="387" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">训练环境</text>

  <text x="165" y="412" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">硬件</text>
  <text x="165" y="428" text-anchor="middle" font-size="8" fill="#7F8C8D">Tesla V100-SXM2-16GB</text>
  <text x="165" y="444" text-anchor="middle" font-size="8" fill="#7F8C8D">单卡训练</text>

  <text x="165" y="472" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">软件</text>
  <text x="165" y="488" text-anchor="middle" font-size="8" fill="#7F8C8D">Python 3.11 | PyTorch 2.4.0</text>
  <text x="165" y="504" text-anchor="middle" font-size="8" fill="#7F8C8D">Ultralytics 8.3.227</text>

  <text x="165" y="530" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">训练效率</text>
  <text x="165" y="548" text-anchor="middle" font-size="8" fill="#7F8C8D">~4.6 min/epoch | 30 epochs ≈ 2.3h</text>
  <text x="165" y="564" text-anchor="middle" font-size="8" fill="#7F8C8D">推理速度: ~4.0 ms/image (V100)</text>
</svg>
